name: pilgrims_companion
description: Offline-first Hajj & Umrah guide app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  dio: ^5.4.0
  pdfx: ^2.6.0
  connectivity_plus: ^5.0.2
  intl: ^0.20.2

  webview_flutter: ^4.4.2
  
  # HTTP requests for news & prayer times
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/icons/

# ✅ MOVE IT HERE (outside flutter)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#2D5F3F"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  remove_alpha_ios: true   # ✅ ADD THIS