name: pilgrims_companion
description: Offline-first Hajj & Umrah guide app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1

  # Download & Networking
  dio: ^5.4.0

  # PDF Viewer
  pdfx: ^2.6.0

  # Utilities
  connectivity_plus: ^5.0.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/icons/